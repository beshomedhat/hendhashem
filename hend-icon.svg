<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- background circle -->
  <circle cx="100" cy="100" r="100" fill="#1a2e1e"/>
  
  <!-- motion lines -->
  <line x1="62" y1="58" x2="48" y2="50" stroke="#c4862a" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="65" y1="70" x2="50" y2="68" stroke="#c4862a" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  <line x1="66" y1="82" x2="51" y2="83" stroke="#c4862a" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>

  <!-- arm raised up -->
  <path d="M108,88 Q122,62 116,36" stroke="#f5f0e8" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- glowing dot at hand tip -->
  <circle cx="116" cy="36" r="7" fill="#c4862a"/>
  <circle cx="116" cy="36" r="4" fill="#e8a84a"/>

  <!-- arm out to side -->
  <path d="M108,88 Q88,96 62,93" stroke="#f5f0e8" stroke-width="5.5" fill="none" stroke-linecap="round"/>

  <!-- body -->
  <path d="M108,88 Q105,112 102,132" stroke="#f5f0e8" stroke-width="6.5" fill="none" stroke-linecap="round"/>

  <!-- head -->
  <circle cx="114" cy="72" r="18" fill="#f5f0e8"/>

  <!-- leg bent back — dynamic -->
  <path d="M102,132 Q88,148 90,164" stroke="#f5f0e8" stroke-width="5.5" fill="none" stroke-linecap="round"/>
  <!-- leg forward -->
  <path d="M102,132 Q114,150 122,162" stroke="#f5f0e8" stroke-width="5.5" fill="none" stroke-linecap="round"/>
</svg>
